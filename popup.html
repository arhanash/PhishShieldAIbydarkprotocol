<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- SECTION 1: Page Metadata & Fonts -->
    <title>PhishShield AI</title>
    <!-- We load Inter font from google for a clean, modern aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Links to our stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        
        <!-- SECTION 2: Header & Branding -->
        <!-- Contains the gradient logo SVG and the subtitle of the project -->
        <header>
            <div class="logo-container">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22S21 17.55 21 11V5L12 2L3 5V11C3 17.55 12 22 12 22Z" fill="url(#paint0_linear)"/>
                        <path d="M10.5 15.5L6.5 11.5L7.91 10.09L10.5 12.67L16.09 7.09L17.5 8.5L10.5 15.5Z" fill="white"/>
                        <defs>
                            <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#3B82F6"/>
                                <stop offset="1" stop-color="#8B5CF6"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <h1>PhishShield AI</h1>
                </div>
            </div>
            <p class="subtitle">Real-Time Hybrid Threat Detection</p>
        </header>

        <!-- SECTION 3: Input Tabs -->
        <!-- Allows the user to toggle the UI between URL scanning, Text scanning, and Threat History -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="url">Scan URL</button>
            <button class="tab-btn" data-tab="text">Scan Text</button>
            <button class="tab-btn" data-tab="history">Threat Log</button>
        </div>

        <!-- SECTION 4: Input Elements Container -->
        <!-- This holds the input boxes that gather the data sent to the backend -->
        <div class="input-section">
            
            <!-- URL input box. Has a secondary button to grab the active browser tab via Chrome Extension APIs -->
            <div id="url-input-group" class="input-group">
                <input type="text" id="url-input" placeholder="Enter URL to scan... Ex: http://secure-login.xyz" autocomplete="off">
                <div class="actions-row">
                    <button class="btn-secondary" id="getCurrentUrlBtn" title="Grab URL from the active tab">Use Current Tab</button>
                </div>
            </div>
            
            <!-- Textarea input box. Hidden by default using the 'hidden' CSS class. Unhidden by JS when tab is clicked -->
            <div id="text-input-group" class="input-group hidden">
                <textarea id="text-input" placeholder="Paste email content or message here..."></textarea>
            </div>

            <!-- The primary trigger button. Contains a spinner div that is shown while waiting for backend -->
            <button id="analyzeBtn" class="btn-primary">
                <span id="btnText">Analyze Target</span>
                <!-- Animated Spinner indicator injected by CSS when awaiting AI processing -->
                <div class="spinner hidden" id="loadingSpinner"></div>
            </button>
        </div>
        
        <!-- Threat History Dashboard - Hidden by default -->
        <div id="history-group" class="hidden">
            <div class="history-header">
                <h3>Intercepted Threats</h3>
                <button id="clearHistoryBtn" class="btn-secondary" style="font-size: 10px; padding: 4px 8px;">Clear Log</button>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items injected by JS -->
                <div class="empty-history" id="emptyHistory">No threats logged yet. You are safe!</div>
            </div>
        </div>

        <!-- Hidden error message block if the backend fails or input is empty -->
        <div id="errorMsg" class="error-msg hidden"></div>

        <!-- SECTION 5: Output/Results Card -->
        <!-- Starts out hidden. Populated with data by JS once Python API returns the score -->
        <div id="resultsCard" class="results-card hidden">
            
            <!-- Top portion: Status (e.g. Dangerous) and calculated integer out of 100 -->
            <div class="status-header">
                <div class="status-badge" id="statusBadge">Status</div>
                <div class="score-container">
                    <span class="score-text">Risk Score</span>
                    <span id="scoreValue" class="score-value">0</span><span class="score-max">/100</span>
                </div>
            </div>
            
            <!-- Visual CSS progress bar that fills up (e.g. 75% red) based on the threat score -->
            <div class="score-bar-container">
                <div id="scoreBar" class="score-bar"></div>
            </div>
            
            <!-- Explainability: A human-readable sentence summarizing the technical threat -->
            <div class="explanation-box" id="explanationBox">
                <!-- Explanations injected dynamically -->
            </div>

            <!-- Explainability: Detailed bullet points generated by Python rule-engine -->
            <div class="reasons-list">
                <h3>Detection Details</h3>
                <ul id="reasonsUl"></ul>
            </div>
        </div>
        
    </div>
    <!-- Load functionality script at the end of the body -->
    <script src="popup.js"></script>
</body>
</html>
