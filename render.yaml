services:
  - type: web
    name: phishshield-ai-backend
    env: python
    region: oregon 
    plan: free
    repo: https://github.com/arhanash/PhishShieldAIbydarkprotocol
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
